name: CI

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: test-key
      SUPABASE_URL: http://mock.supabase.local
      SUPABASE_ANON_KEY: test-key
      SUPABASE_KEY: test-key
      API_SECRET: ""
      MODERATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pytest
        run: pytest -q --cov=backend --cov=modules --cov-report=term-missing
      - name: pip-audit (warn only)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true

  frontend:
    name: Frontend tests & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci || npm install
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000
      - name: npm audit (warn only)
        continue-on-error: true
        run: npm audit --audit-level=high || true

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci || npm install
      - run: npx playwright install --with-deps chromium
      - name: E2E smoke
        run: npx playwright test --project="Desktop Chrome"
        env:
          CI: "true"
          VITE_API_URL: http://127.0.0.1:5173

  security:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
